services:
  - type: web
    name: convoy-backend
    runtime: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: OFF_ROUTE_THRESHOLD_METERS
        value: "75"
      - key: SPLIT_THRESHOLD_METERS
        value: "5000"
